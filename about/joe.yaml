name: Joe
short_name: Joe
bio: |
  This is a blog about math and math adjacent things. I got so damn tired of people saying "I'm not a math person" that I decided to do something about it.

  As a matter of principle, I will try to explain things as simply as possible. There will be times when I'm not going to do that. You will know it when you see \ddag after the post title. That's the double dagger. Put your boots on because you're going to have to wade through some shit.

  Math is easy. Math is fun. Math is for the people.
